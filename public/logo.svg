<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FDE047" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#EAB308" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer circular orbit ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#4b4b4b" stroke-width="0.7"/>

  <!-- Dashed elliptical orbit tilted ~-18 deg -->
  <ellipse cx="50" cy="50" rx="39" ry="17"
    fill="none" stroke="#EAB308" stroke-width="0.9"
    stroke-dasharray="4 2.5"
    transform="rotate(-18 50 50)"/>

  <!-- Sun outer halo -->
  <circle cx="50" cy="50" r="23" fill="url(#sunGrad)" filter="url(#glow-strong)"/>

  <!-- Sun bright body -->
  <circle cx="50" cy="50" r="16" fill="#EAB308" filter="url(#glow-soft)"/>

  <!-- Black centre hole -->
  <circle cx="50" cy="50" r="10.5" fill="#0a0a0a"/>

  <!-- Gray moon — left on circular ring -->
  <circle cx="5"  cy="50" r="3.2" fill="#666"/>

  <!-- Gray moon — bottom-right on ellipse -->
  <circle cx="70" cy="79" r="3.2" fill="#666"/>

  <!-- Yellow moon — top-left on ellipse -->
  <circle cx="16" cy="19" r="3.8" fill="#FDE047" filter="url(#glow-soft)"/>

  <!-- Yellow moon — right on ellipse -->
  <circle cx="88" cy="55" r="3.8" fill="#FDE047" filter="url(#glow-soft)"/>
</svg>
